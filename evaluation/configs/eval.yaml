dataset:
  repo_id: hoangphann/ViFoodVQA
  revision:
  data_dir: data/vifoodvqa
  test_split: test
  require_nonempty_triples: true

paths:
  output_dir: outputs
  vqa_src_dir: ViFoodVQA/src
  kg_question_types_csv: config/question_types.csv

evaluation:
  seed: 42
  top_k: 10
  max_new_tokens: 256
  temperature: 0
  fixed_shot_vqa_ids: [153, 149]
  human_error_subset_size: 120
  conditions:
    - name: no_kg_0shot
      knowledge: none
      shots: 0
    - name: no_kg_1shot
      knowledge: none
      shots: 1
    - name: no_kg_2shot
      knowledge: none
      shots: 2
    - name: hybrid
      knowledge: retrieved
      retrieval_strategy: hybrid
      shots: 0
    - name: graph_only
      knowledge: retrieved
      retrieval_strategy: graph_only
      shots: 0
    - name: vector_only
      knowledge: retrieved
      retrieval_strategy: vector_only
      shots: 0
    - name: bm25
      knowledge: retrieved
      retrieval_strategy: bm25
      shots: 0
    - name: oracle
      knowledge: oracle
      shots: 0

models:
  qwen3_vl_2b:
    type: hf
    model_id: Qwen/Qwen3-VL-2B-Instruct
    adapter: qwen3_vl
    device_map: auto
    torch_dtype: auto
    generation_kwargs:
      repetition_penalty: 1.05
      no_repeat_ngram_size: 6
      eos_token_id: tokenizer
      pad_token_id: tokenizer
  phi3_vision:
    type: hf
    model_id: microsoft/Phi-3.5-vision-instruct
    adapter: phi3_vision
    auto_model: causal_lm
    load_config_first: true
    device_map: auto
    torch_dtype: auto
    attn_implementation: eager
    num_crops: 16
    use_cache: false
    trust_remote_code: true
    generation_kwargs:
      pad_token_id: tokenizer
  gpt_5_2:
    type: openai_compatible
    model_id: cx/gpt-5.2
    base_url_env: OPENAI_COMPAT_BASE_URL
    api_key_env: OPENAI_COMPAT_API_KEY
  gpt_5_5:
    type: openai_compatible
    model_id: cx/gpt-5.5
    base_url_env: OPENAI_COMPAT_BASE_URL
    api_key_env: OPENAI_COMPAT_API_KEY
